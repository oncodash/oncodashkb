row:
    translate:
        column: patient
        to_subject: patient
        translations_file: {{{DECIDER_DIR}}}/clinical/clinical_export.xlsx
        translate_from: Patient card::Patient cohort code_Patient Card
        translate_to: Patient card::Publication code
        index_col: 0
        usecols: [0,1,2]
transformers:
    - translate_sample_ids :
        column: sample
        to_object: sample
        via_relation: patient_carries_sample
        translations_file: {{{DECIDER_DIR}}}/clinical/clinical_export.xlsx
        translate_from: Patient card::Patient cohort code_Patient Card
        translate_to: Patient card::Publication code
        index_col: 0
        usecols: [0,1,2]
    ## Alteration
    - cat_format:
        columns:
            - Gene
            - CHROM
            - POS
            - REF
            - ALT
        to_object: short_mutation
        from_subject: sample
        format_string: "{Gene}:{CHROM}:{POS}:{REF}:{ALT}"
        via_relation: sample_carries_variant
    - map:
        column: ExonicFunc
        to_property: consequence
        for_object: short_mutation
    - boolean:
        column: Homogeneous
        to_property: homogenous
        for_object: sample_carries_variant
        consider_true:
            - 1.0
        consider_false:
            - 0.0
    - map:
        column: refCount
        to_property: refCount
        for_object: sample_carries_variant
    - map:
        column: altCount
        to_property: altCount
        for_object: sample_carries_variant
    - map:
        column: AD.0
        to_property: AD__0
        for_object: sample_carries_variant
    - map:
        column: AD.1
        to_property: AD__1
        for_object: sample_carries_variant
    - map:
        column: DP
        to_property: DP
        for_object: sample_carries_variant
    - map:
        column: AF
        to_property: AF
        for_object: sample_carries_variant
    - map:
        column: nMajor
        to_property: nMajor
        for_object: sample_carries_variant
    - map:
        column: nMinor
        to_property: nMinor
        for_object: sample_carries_variant
    - map:
        column: LOHstatus
        to_property: LOHstatus
        for_object: sample_carries_variant
    - map:
        column: expHomCI.cover
        to_property: expHomCI__over
        for_object: sample_carries_variant
    - boolean:
        column: Expressed
        to_property: expressed
        for_object: sample_carries_variant
        consider_true:
            - True
        consider_false:
            - False
    - string:
        value: " "
        to_property: edgelabel
        for_objects:
            - patient_carries_sample
            - sample_carries_variant
metadata:
        - data_source: short_mutations_local