
row:
    map:
        id_from_column: alteration
        match_type_from_column: alteration_type
        match:
            - SNV:
                to_subject: short_mutation
            - CNA:
                to_subject: copy_number_amplification
transformers:
    # - replace:
    # # replaced by user-defined transformer with escat level included in the name of the relation
    #     column: treatment
    #     to_object: treatment
    #     via_relation: variant_biomarker_for_treatment
    #     forbidden: ';'
    #     substitute: ' + '
    # 
    # - split_translate:
    # # Not used anymore
    #     column: treatment
    #     to_object: drug
    #     via_relation: variant_biomarker_for_treatment
    #     separator: ";"
    #     translations_file: ./data/OT/drug_molecule/part-00000-871f412e-aec4-4d33-a50d-feee532ddcd2-c000.snappy.parquet
    #     translate_from: name
    #     translate_to: id
    - split_translate:
        column: treatment
        from_subject: treatment
        to_object: drug
        via_relation: treatment_has_part_drug
        separator: ";"
        translations_file: ./data/OT/drug_molecule/part-00000-871f412e-aec4-4d33-a50d-feee532ddcd2-c000.snappy.parquet
        translate_from: name
        translate_to: id
    # Properties
    # ## Drug
    # - split:
    #     column: treatment
    #     from_subject: treatment
    #     to_object: drug
    #     via_relation: treatment_has_part_drug
    #     separator: ";"
    #     translations_file: ./data/OT/drug_molecule/part-00000-871f412e-aec4-4d33-a50d-feee532ddcd2-c000.snappy.parquet
    #     translate_from: name
    #     translate_to: id
    ## Variant biomarker for treatment
    # - map:
    #  # Replaced by escat_tier_transformer
    #     column: level_of_evidence
    #     to_property: level_of_evidence
    #     for_object: variant_biomarker_for_treatment
    - escat_tier_transformer
    - replace:
        column: citations
        to_property: citations
        for_object:
          - variant_biomarker_for_treatment_level_IA
          - variant_biomarker_for_treatment_level_IC
          - variant_biomarker_for_treatment_level_II
          - variant_biomarker_for_treatment_level_IIIA
          - variant_biomarker_for_treatment_level_IIIB
          - variant_biomarker_for_treatment_level_IVA
          - variant_biomarker_for_treatment_level_IVB
        forbidden: ';'
        substitute: ','
    - map:
        column: tumorType
        to_property: tumorType
        for_object:
          - variant_biomarker_for_treatment_level_IA
          - variant_biomarker_for_treatment_level_IC
          - variant_biomarker_for_treatment_level_II
          - variant_biomarker_for_treatment_level_IIIA
          - variant_biomarker_for_treatment_level_IIIB
          - variant_biomarker_for_treatment_level_IVA
          - variant_biomarker_for_treatment_level_IVB

metadata:
        - data_source: oncokb_annotation

validate:
  columns:
    alteration_type:
      dtype: str
      checks:
        isin:
          value:
            - SNV
            - CNA
    alteration:
      dtype: str
    approvedIndications:
      dtype: str
      nullable: true
    description:
      dtype: str
      nullable: true
    treatment:
      dtype: str
      # FIXME sometimes treatments separated by semicolon, sometimes by comma.
    level_of_evidence:
      dtype: str
      nullable: true
      checks:
        isin:
          value:
            - LEVEL_1
            - LEVEL_2
            - LEVEL_3A
            - LEVEL_3B
            - LEVEL_4
#            - LEVEL_R1 # FIXME: not present in data declared in source description.
#            - LEVEL_R2 # FIXME: not present in data declared in source description.
    citations: #FIXME sometimes there is "PMID:[PMID_NUMBER]" sometimes there is only "[PMID_NUMBER]".
      dtype: str
      nullable: true
    tumorType:
      dtype: str
      nullable: true
    cgi_level: # FIXME not present in source description.
      dtype: str
      nullable: true
      checks:
        str_matches: ^[ABCD]\([^\d]+\)$
