row:
    translate:
        column: patient_id
        to_subject: patient
        translations_file: {{{DECIDER_DIR}}}/clinical_export.xlsx
        translate_from: Patient card::Patient cohort code_Patient Card
        translate_to: Patient card::Publication code
        index_col: 0
        on_unknown_value: skip
        usecols: [0,1,2]
transformers:
    # Nodes
    ## Samples
    - translate_sample_ids :
        column: sample_id
        to_object: sample
        via_relation: patient_carries_sample
        translations_file: {{{DECIDER_DIR}}}/clinical_export.xlsx
        translate_from: Patient card::Patient cohort code_Patient Card
        translate_to: Patient card::Publication code
        index_col: 0
        usecols: [0,1,2]
    ## Alterations
    - cat_format:
        columns:
            - hugoSymbol
            - alteration
        from_subject: sample
        to_object: copy_number_amplification
        via_relation: sample_carries_variant
        format_string: "{hugoSymbol}:{alteration}"
    ## Gene status
    - translate_cat_format:
        columns:
            - hugoSymbol
            - gene_role
        from_subject: copy_number_amplification
        to_object: gene_status
        via_relation: variant_causes_gene_status
        # to_property: gene_symbol_gene_status
        # for_object: gene_status
        format_string: "{hugoSymbol}:{gene_role}"
        column_to_translate: 
            - gene_role
        translations:
            Loss-of-function: LoF
            Likely Loss-of-function: LoF
            Gain-of-function: GoF
            Likely Gain-of-function: GoF
            Act: GoF
            Inconclusive: Inconclusive
            ambiguous: ambiguous
            Unknown: Unknown
    ## Genes
    - map:
        column: ensembl_id
        from_subject: gene_status
        to_object: gene
        via_relation: gene_status_affects_gene
    # Properties
    ## Alterations
    - cat_format:
        columns:
            - ensembl_id
            - alteration
        to_property: ensembl_id_alteration
        for_object: copy_number_amplification
        format_string: "{ensembl_id}:{alteration}"
    ## Gene status
    - translate_cat_format:
        columns:
          - ensembl_id
          - gene_role
        to_property: ensembl_id_gene_status
        for_object: gene_status
        # from_subject: copy_number_amplification
        # to_object: gene_status
        # via_relation: variant_causes_gene_status
        format_string: "{ensembl_id}:{gene_role}"
        column_to_translate: 
            - gene_role
        translations:
            Loss-of-function: LoF
            Likely Loss-of-function: LoF
            Gain-of-function: GoF
            Likely Gain-of-function: GoF
            Act: GoF
            Inconclusive: Inconclusive
            ambiguous: ambiguous
            Unknown: Unknown
    - translate:
        columns: gene_role
        to_property: gene_role
        for_object: variant_causes_gene_status
        on_unknown_value: skip
        translations:
            Loss-of-function: LoF
            Likely Loss-of-function: LoF
            Gain-of-function: GoF
            Likely Gain-of-function: GoF
            Act: GoF
            Inconclusive: Inconclusive
            ambiguous: ambiguous
            Unknown: Unknown
    - boolean:
        columns: gene_role
        to_property: likely
        for_object: gene_status
        consider_true:
            - Likely Loss-of-function
            - Likely Gain-of-function
        consider_false:
            - LoF
            - Gain-of-function
            - Inconclusive
            - Act
            - ambiguous
            - Unknown
    ## Genes
    - map: 
        column: hugoSymbol
        to_property: gene_symbol
        for_object: gene
    ## Alterations
    - map:
        column: tumorType
        to_property: tumor_type
        for_object: copy_number_amplification
    - map:
        column: oncogenic
        to_property: oncokb_oncogenic_annotation
        for_object: copy_number_amplification
    - boolean:
        column: oncogenic
        to_property: oncogenic
        for_object: copy_number_amplification
        consider_true:
            - Oncogenic
            - Likely Oncogenic
        consider_false:
            - Unknown
            - predicted
            - Inconclusive
            - known
    - replace:
        column: mutationEffectDescription
        to_property: mutation_effect_description
        for_object: copy_number_amplification
    - map:
        column: citationPMids
        to_property: citation_PM_ids
        for_object: copy_number_amplification
    - replace:
        column: geneSummary
        to_property: gene_summary
        for_object: gene
    - map:
        column: variantSummary
        to_property: variant_summary
        for_object: copy_number_amplification
    - map:
        column: tumorTypeSummary
        to_property: tumor_type_summary
        for_object: copy_number_amplification
    - string:
        value: " "
        to_property: edgelabel
        for_objects:
            - patient_carries_sample
            - sample_carries_variant
            - variant_causes_gene_status
            - gene_status_affects_gene

metadata:
        - data_source: DECIDER_copy_number_amplifications_external
