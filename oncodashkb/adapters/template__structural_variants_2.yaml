row:
    translate:
        column: patient
        to_subject: patient
        translations_file: {{{DECIDER_DIR}}}/clinical_export.xlsx
        translate_from: Patient card::Patient cohort code_Patient Card
        translate_to: Patient card::Publication code
        index_col: 0
        # usecols: [0,1,2]
        on_unknown_value: skip
transformers:
    # NodesINFO    ## Samples
    - translate_sample_ids :
        column: sample
        to_object: sample
        via_relation: patient_carries_sample
        translations_file: {{{DECIDER_DIR}}}/clinical_export.xlsx
        translate_from: Patient card::Patient cohort code_Patient Card
        translate_to: Patient card::Publication code
        index_col: 0
        usecols: [0,1,2]
    ## Alterations
    - cat_format:
        columns:
            - gene
            - mutation
        from_subject: sample
        to_object: structural_variant
        via_relation: sample_carries_variant
        format_string: "{gene}:{mutation}"
    ## Gene status
    # - translate_cat_format:
    - cat_format:
        column: gene
        from_subject: structural_variant
        to_object: gene_status
        # format_string: "{primary_gene}:loss"
        format_string: "{gene}:loss"
        via_relation: variant_causes_gene_status
    ## Genes
    - translate:
        columns:
            - gene
        from_subject: gene_status
        to_object: gene
        via_relation: gene_status_affects_gene
        translations_file: data/HGNC/hgnc_complete_set.txt
        translate_from: symbol
        translate_to: ensembl_gene_id
        sep: "\t"
        on_unknown_value: skip
    # Properties
    ## Alterations
    - map:
        column: truncation
        to_property: truncation
        for_object: structural_variant
    - map:
        column: undisruptedCopiesMin2
        to_property: undisruptedCopiesMin2
        for_object: structural_variant
    - map:
        column: anySV
        to_property: anySV
        for_object: structural_variant
    - map:
        column: effects
        to_property: effects
        for_object: structural_variant
    - cat_format:
        columns:
            - gene
            - mutation
        to_property: cytoscape_label
        for_object: structural_variant
        format_string: "{gene}:{mutation}"
    - translate_cat_format:
        columns:
            - gene
            - mutation
        to_property: ensembl_id_alteration
        for_object: structural_variant
        format_string: "{gene}:{mutation}"
        column_to_translate:
            - gene
        translations_file: data/HGNC/hgnc_complete_set.txt
        translate_from: symbol
        translate_to: ensembl_gene_id
        sep: "\t"
    ## Gene status
    - cat_format:
        columns:
            # - primary_gene
            - gene
            - Gene_type
        to_property: gene_symbol_gene_status
        for_object: gene_status
        format_string: "{gene}:loss"
    # - translate:
    # - map:
    #     column: FIXME
    #     string: loss
    #     to_property: gene_role
    #     for_object: gene_status
    ## Genes
    - map:
        column: gene
        to_property: gene_symbol
        for_object: gene
    - string:
        value: " "
        to_property: edgelabel
        for_objects:
            - patient_carries_sample
            - sample_carries_variant
            - variant_causes_gene_status
            - gene_status_affects_gene

metadata:
        - data_source: DECIDER_structural_variants

