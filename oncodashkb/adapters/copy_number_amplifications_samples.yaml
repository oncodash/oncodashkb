row:
    translate_sample_ids :
        column: sample
        to_subject: sample
        via_relation: patient_carries_sample
        translations_file: ./data/DECIDER/clinical/clinical_export.xlsx
        translate_from: Patient card::Patient cohort code_Patient Card
        translate_to: Patient card::Publication code
        index_col: 0
        usecols: [0,1,2]
transformers:
    - map:
        column: ploidy
        to_property: ploidy
        for_object: sample
    - map:
        column: ssite
        to_property: tumor_site
        for_object: sample
    - map:
        column: stime
        to_property: sample_time
        for_object: sample
    - map:
        column: sside
        to_property: sample_type
        for_object: sample
