row:
    translate:
        column: patient_id
        to_subject: patient
        translations_file: {{{DECIDER_DIR}}}/clinical/clinical_export.xlsx
        translate_from: Patient card::Patient cohort code_Patient Card
        translate_to: Patient card::Publication code
        index_col: 0
        usecols: [0,1,2]
transformers:
    - translate_sample_ids :
        column: sample_id
        to_object: sample
        via_relation: patient_carries_sample
        translations_file: {{{DECIDER_DIR}}}/clinical/clinical_export.xlsx
        translate_from: Patient card::Patient cohort code_Patient Card
        translate_to: Patient card::Publication code
        index_col: 0
        usecols: [0,1,2]
    - cat_format:
        columns:
            - hugoSymbol
            - alteration
        from_subject: sample
        to_object: copy_number_amplification
        format_string: "{hugoSymbol}:{alteration}"
        via_relation: sample_carries_variant
    # - boolean:
    #     column: Expressed
    #     to_property: expressed
    #     for_object: sample_carries_variant 
    #     consider_true:
    #         - 1.0
    #     consider_false:
    #         - 0.0
    # - map:
    #     column: referenceGenome
    #     to_property: reference_genome
    #     for_object: copy_number_amplification
    # - map:
    #     column: tumorType
    #     to_property: tumor_type
    #     for_object: copy_number_amplification
    - map:
        column: nMinor
        to_property: nMinor
        for_object: sample_carries_variant
    - map:
        column: nMajor
        to_property: nMajor
        for_object: sample_carries_variant

metadata:
        - data_source: copy_number_amplifications_local