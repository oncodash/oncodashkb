########################
# EDGES
########################

## CAUSAL LINKS
## Everything that derivates from the "causes" link type.
## Comprises both real causes and ownership ("carries").

### CARRIES

# To allow queries for patient carrying samples, and samples carrying variants,
# without mixing with "effects" causes.
carries:
    is_a: causes
    represented_as: edge
    label_in_input: carries
    properties:
        data_source: str
        edglelabel: str

patient carries sample:
    is_a: carries
    represented_as: edge
    label_in_input: patient_carries_sample
    source: patient
    target: sample
    properties:
        data_source: str
        edglelabel: str

sample carries variant:
    is_a: carries
    represented_as: edge
    label_in_input: sample_carries_variant
    source: sample
    target: sequence variant
    properties:
        refCount: int64
        altCount: int64
        expressed: bool
        homogenous: bool
        data_source: str
        edglelabel: str
        AD__0: str
        AD__1: str
        DP: str
        AF: str
        nMajor: str
        nMinor: str
        LOHstatus: str
        expHomCI__over: str
        undisruptedCopyNumber: str
        affectedCopyNumber: str


### CAUSES

# A gene is linked to its gene status (gain or loss of function),
# which are represented as nodes, so as to allow a causal path
# to go through variant -> gene status -> transcript activity.
# Hence, outcomes have at least two instances:
# - Gene:GoF, and
# - Gene:LoF.

variant causes gene status:
    is_a: causes
    represented_as: edge
    label_in_input: variant_causes_gene_status
    source: sequence variant
    target: gene status
    properties:
        likely: bool
        data_source: str
        edglelabel: str

### BIOMARKER

# In some databases, such as OncoKB, drugs are associated with variants
# as predictive markers for treatment response, 
# based on clinical evidence categorized by evidence levels. 

variant biomarker for treatment:
    is_a: sequence variant modulates treatment association
    represented_as: edge
    label_in_input: variant_biomarker_for_treatment
    # source: sequence variant
    # target: treatment
    properties:
        fda_level: str
        level_of_evidence: str
        cgi_level: str
        citations: str
        tumorType: str
        Cancer_types: str
        data_source: str
        Tier: str

